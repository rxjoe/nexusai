<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI - تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0f; color: #f0f0f5;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #141416; border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 48px 40px; width: 400px; max-width: 90vw;
    text-align: center;
  }
  .login-card img { width: 80px; height: 80px; margin-bottom: 16px; }
  .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-card p { color: #8a8a9a; font-size: 14px; margin-bottom: 32px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; text-decoration: none; margin-bottom: 12px;
  }
  .btn-google { background: #fff; color: #333; }
  .btn-google:hover { background: #e8e8e8; }
  .btn-github { background: #24292e; color: #fff; }
  .btn-github:hover { background: #1b1f23; }
  .btn-drive { background: #1a73e8; color: #fff; }
  .btn-drive:hover { background: #1557b0; }
  .btn svg { flex-shrink: 0; }
  .error-msg { color: #ef4444; font-size: 13px; margin-top: 16px; display: none; }
  .separator { color: #55555f; font-size: 12px; margin: 20px 0; }
  .separator span { display: inline-block; padding: 0 12px; background: #141416; position: relative; z-index: 1; }
  .separator::after { content: ''; display: block; border-top: 1px solid rgba(255,255,255,0.06); margin-top: -8px; }
  .guest-link { color: #00d4ff; font-size: 13px; text-decoration: none; cursor: pointer; }
  .guest-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card">
  <img src="assets/nexusai_logo_white.svg" alt="NexusAI">
  <h1>مرحباً بك في NexusAI</h1>
  <p>سجّل الدخول لتفعيل المحادثات المحفوظة، وضع Agent، والبحث المتقدم</p>

  <a href="/auth/google" class="btn btn-google">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.47 0 11.89-2.14 15.85-5.78l-7.73-6c-2.14 1.43-4.88 2.28-8.12 2.28-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
    تسجيل الدخول بـ Google
  </a>

  <a href="/auth/github" class="btn btn-github">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58 0-.28-.01-1.04-.02-2.05-3.33.72-4.03-1.6-4.03-1.6-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .1-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23.96-.27 1.98-.4 3-.4s2.04.13 3 .4c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.82 5.63-5.5 5.92.43.37.82 1.1.82 2.22 0 1.6-.01 2.89-.01 3.28 0 .32.22.7.83.58C20.57 21.79 24 17.3 24 12 24 5.37 18.63 0 12 0z"/></svg>
    تسجيل الدخول بـ GitHub
  </a>

  <a href="/auth/google?scope=drive" class="btn btn-drive">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#1a73e8" d="M24 16l12 20H12l12-20z"/><path fill="#0d47a1" d="M12 36l6-10 6 10H12z"/><path fill="#1565c0" d="M36 36H12l12-20 12 20z"/></svg>
    تسجيل الدخول بـ Google Drive
  </a>

  <div class="separator"><span>أو</span></div>
  <a href="/" class="guest-link">الدخول كزائر (محدود)</a>

  <div class="error-msg" id="error-msg"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'google') document.getElementById('error-msg').textContent = 'فشل تسجيل الدخول بـ Google';
  if (params.get('error') === 'github') document.getElementById('error-msg').textContent = 'فشل تسجيل الدخول بـ GitHub';
  if (params.get('error')) document.getElementById('error-msg').style.display = 'block';
</script>
</body>
</html>
